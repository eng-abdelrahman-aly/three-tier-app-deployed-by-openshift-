<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzel Auth System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 10px; margin: 5px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-login { background-color: #0066cc; color: white; }
        .btn-signup { background-color: #28a745; color: white; }
        #status { margin-top: 15px; font-size: 14px; color: #555; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Buzzel App</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn-login" onclick="handleAuth('login')">Login</button>
    <button class="btn-signup" onclick="handleAuth('signup')">Sign Up</button>
    <p id="status">Enter your credentials</p>
</div>

<script>
    // تذكر استخدام الـ FQDN الخاص بالـ Backend Route
    const BACKEND_URL = "http://be-route-buzzel-app.apps-crc.testing";

    async function handleAuth(type) {
        const user = document.getElementById("username").value;
        const pass = document.getElementById("password").value;
        const status = document.getElementById("status");

        if (!user || !pass) {
            status.innerText = "Please fill all fields";
            return;
        }

        status.innerText = "Processing...";

        try {
            const response = await fetch(`${BACKEND_URL}/${type}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: user, password: pass })
            });

            const data = await response.json();

            if (response.ok) {
                status.style.color = "green";
                status.innerText = data.message;
                if (type === 'login') {
                    localStorage.setItem("token", data.token); // حفظ التوكن
                    status.innerText += " - Redirecting...";
                }
            } else {
                status.style.color = "red";
                status.innerText = data.error || "Error occurred";
            }
        } catch (err) {
            status.style.color = "red";
            status.innerText = "Connection failed: " + err.message;
        }
    }
</script>
</body>
</html>
